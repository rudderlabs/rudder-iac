name: test with code coverage
on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-upload-code-coverage:
    name: "upload coverage to codecov"
    runs-on: "ubuntu-24.04"
    concurrency:
      group: test-and-upload-code-coverage
      cancel-in-progress: false
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          check-latest: true
          cache: true
          go-version: "~1.24"

      - name: checking go version
        run: go version

      - name: running tests
        run: make test-all
        env:
          RUDDERSTACK_API_URL: ${{ vars.RUDDERSTACK_API_URL }}
          RUDDERSTACK_ACCESS_TOKEN: ${{ secrets.RUDDERSTACK_ACCESS_TOKEN }}
          RUDDERSTACK_CLI_DEBUG: ${{ vars.RUDDERSTACK_CLI_DEBUG }}
          RUDDERSTACK_CLI_TELEMETRY_DISABLED: ${{ vars.RUDDERSTACK_CLI_TELEMETRY_DISABLED }}
          RUDDERSTACK_CLI_EXPERIMENTAL: ${{ vars.RUDDERSTACK_CLI_EXPERIMENTAL }}
          RUDDERSTACK_X_CONCURRENT_SYNCS: ${{ vars.RUDDERSTACK_X_CONCURRENT_SYNCS }}
          RUDDERSTACK_X_TRANSFORMATIONS: ${{ vars.RUDDERSTACK_X_TRANSFORMATIONS }}

      - name: upload cli logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: cli.log
          path: ~/.rudder/cli.log

      - name: upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: rudderlabs/rudder-iac
          files: |
            coverage-unit.out
            coverage-e2e.out
