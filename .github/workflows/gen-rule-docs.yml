name: generate rule docs
on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  gen-rule-docs:
    name: "generate validation rule catalog"
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job only reads the tree, builds, and uploads an artifact — it
          # never pushes. Don't leave the git credential on disk where the
          # artifact upload could capture it (zizmor artipacked).
          persist-credentials: false

      - name: setup go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          # This workflow publishes a runtime artifact on push to main, so a
          # poisoned build/module cache could be baked into it. Generation is
          # fast and the cache buys little here (zizmor cache-poisoning).
          # Matches release.yml / typer-typescript-validate.yml.
          cache: false

      # Doubles as the drift/completeness gate: gen-rule-docs validates the
      # joined catalog and exits non-zero if any rule lacks an authored doc
      # fragment (or a fragment references an unknown rule), failing the build.
      - name: generate rule catalog
        run: make gen-rule-docs
        env:
          RUDDERSTACK_CLI_EXPERIMENTAL: ${{ vars.RUDDERSTACK_CLI_EXPERIMENTAL || 'true' }}
          RUDDERSTACK_X_DESTINATION_SUPPORT: ${{ vars.RUDDERSTACK_X_DESTINATION_SUPPORT || 'true' }}

      - name: upload rule catalog
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rules.yaml
          path: docs/generated/rules.yaml
          if-no-files-found: error
