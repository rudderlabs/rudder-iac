services:
  validator:
    image: node:20-alpine@sha256:fb4cd12c85ee03686f6af5362a0b0d56d50c58a04632e6c0fb8363f609372293
    working_dir: /app
    volumes:
      - .:/app
      - validator-node-modules:/app/node_modules
    command: sh -c "npm ci && npm run typecheck && npm test"

volumes:
  validator-node-modules:
