rule_id: "project/metadata-syntax-valid"
match_behavior:
  - applies_to:
      - kind: "categories"
        version: "rudder/0.1"
      - kind: "categories"
        version: "rudder/v0.1"
      - kind: "categories"
        version: "rudder/v1"
      - kind: "custom-types"
        version: "rudder/0.1"
      - kind: "custom-types"
        version: "rudder/v0.1"
      - kind: "custom-types"
        version: "rudder/v1"
      - kind: "event-stream-source"
        version: "rudder/0.1"
      - kind: "event-stream-source"
        version: "rudder/v0.1"
      - kind: "event-stream-source"
        version: "rudder/v1"
      - kind: "events"
        version: "rudder/0.1"
      - kind: "events"
        version: "rudder/v0.1"
      - kind: "events"
        version: "rudder/v1"
      - kind: "properties"
        version: "rudder/0.1"
      - kind: "properties"
        version: "rudder/v0.1"
      - kind: "properties"
        version: "rudder/v1"
      - kind: "retl-source-sql-model"
        version: "rudder/0.1"
      - kind: "retl-source-sql-model"
        version: "rudder/v0.1"
      - kind: "retl-source-sql-model"
        version: "rudder/v1"
      - kind: "tp"
        version: "rudder/0.1"
      - kind: "tp"
        version: "rudder/v0.1"
      - kind: "tracking-plan"
        version: "rudder/v1"
      - kind: "transformation"
        version: "rudder/v1"
      - kind: "transformation-library"
        version: "rudder/v1"
      - kind: "destination"
        version: "rudder/v1"
    valid:
      - example_id: "metadata-name-only"
        title: "Metadata with only the required name"
        description: "The minimal valid metadata block: a name and nothing else."
        files:
          spec.yaml: |
            version: rudder/v1
            kind: events
            metadata:
              name: my-events
            spec:
              events: []
      - example_id: "metadata-with-import"
        title: "Metadata with a well-formed import block"
        description: >
          An import block where every workspace has a workspace_id and every
          resource references a URN that exists in the spec body.
        files:
          spec.yaml: |
            version: rudder/v1
            kind: events
            metadata:
              name: my-events
              import:
                workspaces:
                  - workspace_id: ws-123
                    resources:
                      - urn: "event:order_completed"
                        remote_id: ev-remote-456
            spec:
              events:
                - id: order_completed
                  name: Order Completed
    invalid:
      - example_id: "metadata-missing-name"
        title: "Metadata missing the required name field"
        description: "Every spec's metadata must declare a name."
        files:
          spec.yaml: |
            version: rudder/v1
            kind: events
            metadata:
              import:
                workspaces:
                  - workspace_id: ws-123
            spec:
              events: []
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/metadata/name"
            severity: "error"
            message_contains: "'name' is required"
      - example_id: "metadata-import-missing-workspace-id"
        title: "Import workspace missing the required workspace_id"
        description: "Each workspace entry in an import block must declare a workspace_id."
        files:
          spec.yaml: |
            version: rudder/v1
            kind: events
            metadata:
              name: my-events
              import:
                workspaces:
                  - resources:
                      - urn: "event:order_completed"
                        remote_id: ev-remote-456
            spec:
              events:
                - id: order_completed
                  name: Order Completed
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/metadata/import/workspaces/0/workspace_id"
            severity: "error"
            message_contains: "'workspace_id' is required"
