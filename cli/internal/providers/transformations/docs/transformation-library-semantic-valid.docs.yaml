rule_id: "transformations/transformation-library/semantic-valid"
match_behavior:
  - applies_to:
      - kind: "transformation-library"
        version: "rudder/v1"
    valid:
      - example_id: "transformation-library-semantic-valid-unique-import-name"
        title: "Transformation library with unique import_name"
        files:
          spec.yaml: |
            version: rudder/v1
            kind: transformation-library
            metadata:
              name: my-libraries
            spec:
              libraries:
                - id: math-utils
                  name: Math Utils
                  import_name: mathUtils
                  language: javascript
                  code: |
                    export function round(value) {
                      return Math.round(value);
                    }
        description: A single library whose import_name no other library claims validates cleanly.
    invalid:
      - example_id: "transformation-library-semantic-valid-duplicate-import-name"
        title: "Duplicate transformation library import_name"
        files:
          spec.yaml: |
            version: rudder/v1
            kind: transformation-library
            metadata:
              name: my-libraries
            spec:
              libraries:
                - id: math-utils
                  name: Math Utils
                  import_name: mathUtils
                  language: javascript
                  code: |
                    export function round(value) {
                      return Math.round(value);
                    }
                - id: math-helpers
                  name: Math Helpers
                  import_name: mathUtils
                  language: javascript
                  code: |
                    export function ceil(value) {
                      return Math.ceil(value);
                    }
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/import_name"
            severity: "error"
            message_contains: "import_name 'mathUtils' is duplicate"
        description: Two libraries declaring the same import_name collide in the resource graph and fail validation.
