rule_id: "datacatalog/events/semantic-valid"
match_behavior:
  # Legacy spec versions share the same semantic validation path.
  - applies_to:
      - kind: "events"
        version: "rudder/0.1"
      - kind: "events"
        version: "rudder/v0.1"
    valid:
      - example_id: "ev-sem-legacy-valid"
        title: "Unique event (name, type) combinations (legacy)"
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: events
            metadata:
              name: my-events
            spec:
              events:
                - id: page_viewed
                  event_type: track
                  name: Page Viewed
                - id: product_clicked
                  event_type: track
                  name: Product Clicked
    invalid:
      - example_id: "ev-sem-legacy-duplicate"
        title: "Duplicate (name, type) event combination across files (legacy)"
        description: "Two track events in separate files sharing the same name and event_type collide in the resource graph and trigger this error on each file."
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: events
            metadata:
              name: my-events
            spec:
              events:
                - id: page_viewed
                  event_type: track
                  name: Page Viewed
          spec2.yaml: |
            version: rudder/0.1
            kind: events
            metadata:
              name: my-events-2
            spec:
              events:
                - id: page_viewed_copy
                  event_type: track
                  name: Page Viewed
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/events/0"
            severity: "error"
            message_contains: "duplicate name 'Page Viewed' within kind 'events'"
          - file: "spec2.yaml"
            reference: "/events/0"
            severity: "error"
            message_contains: "duplicate name 'Page Viewed' within kind 'events'"
  # Current spec version (rudder/v1).
  - applies_to:
      - kind: "events"
        version: "rudder/v1"
    valid:
      - example_id: "ev-sem-v1-valid"
        title: "Unique event (name, type) combinations (v1)"
        files:
          spec.yaml: |
            version: rudder/v1
            kind: events
            metadata:
              name: my-events
            spec:
              events:
                - id: page_viewed
                  event_type: track
                  name: Page Viewed
                - id: product_clicked
                  event_type: track
                  name: Product Clicked
    invalid:
      - example_id: "ev-sem-v1-duplicate"
        title: "Duplicate (name, type) event combination across files (v1)"
        description: "Two track events in separate files sharing the same name and event_type collide in the resource graph and trigger this error on each file."
        files:
          spec.yaml: |
            version: rudder/v1
            kind: events
            metadata:
              name: my-events
            spec:
              events:
                - id: page_viewed
                  event_type: track
                  name: Page Viewed
          spec2.yaml: |
            version: rudder/v1
            kind: events
            metadata:
              name: my-events-2
            spec:
              events:
                - id: page_viewed_copy
                  event_type: track
                  name: Page Viewed
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/events/0"
            severity: "error"
            message_contains: "duplicate name 'Page Viewed' within kind 'events'"
          - file: "spec2.yaml"
            reference: "/events/0"
            severity: "error"
            message_contains: "duplicate name 'Page Viewed' within kind 'events'"
