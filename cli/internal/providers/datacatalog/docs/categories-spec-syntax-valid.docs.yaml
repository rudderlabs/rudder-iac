rule_id: "datacatalog/categories/spec-syntax-valid"
match_behavior:
  # Legacy spec versions (rudder/0.1 and rudder/v0.1) share the same
  # category spec shape and validation, so they are documented together.
  - applies_to:
      - kind: "categories"
        version: "rudder/0.1"
      - kind: "categories"
        version: "rudder/v0.1"
    valid:
      - example_id: "categories-legacy-valid"
        title: "Valid legacy categories spec"
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: categories
            metadata:
              name: legacy-categories
            spec:
              categories:
                - id: user_actions
                  name: User Actions
                - id: system_events
                  name: System Events
    invalid:
      - example_id: "categories-legacy-missing-name"
        title: "Legacy category missing required name field"
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: categories
            metadata:
              name: legacy-categories
            spec:
              categories:
                - id: user_actions
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/spec/categories/0/name"
            severity: "error"
            message_contains: "'name' is required"
  # Current spec version (rudder/v1).
  - applies_to:
      - kind: "categories"
        version: "rudder/v1"
    valid:
      - example_id: "categories-v1-valid"
        title: "Valid categories spec"
        files:
          spec.yaml: |
            version: rudder/v1
            kind: categories
            metadata:
              name: categories
            spec:
              categories:
                - id: user_actions
                  name: User Actions
                - id: system_events
                  name: System Events
    invalid:
      - example_id: "categories-v1-missing-name"
        title: "Category missing required name field"
        files:
          spec.yaml: |
            version: rudder/v1
            kind: categories
            metadata:
              name: categories
            spec:
              categories:
                - id: user_actions
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/spec/categories/0/name"
            severity: "error"
            message_contains: "'name' is required"
