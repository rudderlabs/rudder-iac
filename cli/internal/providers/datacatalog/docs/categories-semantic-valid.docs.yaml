rule_id: datacatalog/categories/semantic-valid
match_behavior:
- applies_to:
  - kind: categories
    version: rudder/0.1
  - kind: categories
    version: rudder/v0.1
  valid:
  - example_id: cat-sem-legacy-valid
    title: Unique category names (legacy)
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: categories
        metadata:
          name: my-categories
        spec:
          categories:
            - id: user_actions
              name: User Actions
            - id: system_events
              name: System Events
  invalid:
  - example_id: cat-sem-legacy-duplicate
    title: Duplicate category names across files (legacy)
    description: Duplicate category names in the resource graph fail validation.
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: categories
        metadata:
          name: my-categories
        spec:
          categories:
            - id: user_actions
              name: User Actions
      spec2.yaml: |
        version: rudder/0.1
        kind: categories
        metadata:
          name: my-categories-2
        spec:
          categories:
            - id: user_actions_copy
              name: User Actions
    expected_diagnostics:
    - file: spec.yaml
      reference: /categories/0/name
      severity: error
      message_contains: duplicate name 'User Actions' within kind 'categories'
    - file: spec2.yaml
      reference: /categories/0/name
      severity: error
      message_contains: duplicate name 'User Actions' within kind 'categories'
- applies_to:
  - kind: categories
    version: rudder/v1
  valid:
  - example_id: cat-sem-v1-valid
    title: Unique category names (v1)
    files:
      spec.yaml: |
        version: rudder/v1
        kind: categories
        metadata:
          name: my-categories
        spec:
          categories:
            - id: user_actions
              name: User Actions
            - id: system_events
              name: System Events
  invalid:
  - example_id: cat-sem-v1-duplicate
    title: Duplicate category names across files (v1)
    description: Duplicate category names in the resource graph fail validation.
    files:
      spec.yaml: |
        version: rudder/v1
        kind: categories
        metadata:
          name: my-categories
        spec:
          categories:
            - id: user_actions
              name: User Actions
      spec2.yaml: |
        version: rudder/v1
        kind: categories
        metadata:
          name: my-categories-2
        spec:
          categories:
            - id: user_actions_copy
              name: User Actions
    expected_diagnostics:
    - file: spec.yaml
      reference: /categories/0/name
      severity: error
      message_contains: duplicate name 'User Actions' within kind 'categories'
    - file: spec2.yaml
      reference: /categories/0/name
      severity: error
      message_contains: duplicate name 'User Actions' within kind 'categories'
