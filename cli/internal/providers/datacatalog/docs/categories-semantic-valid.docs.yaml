rule_id: "datacatalog/categories/semantic-valid"
match_behavior:
  # Legacy spec versions share the same category spec shape and semantic validation,
  # so they are documented together.
  - applies_to:
      - kind: "categories"
        version: "rudder/0.1"
      - kind: "categories"
        version: "rudder/v0.1"
    valid:
      - example_id: "cat-sem-legacy-valid"
        title: "Unique category names (legacy)"
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: categories
            metadata:
              name: my-categories
            spec:
              categories:
                - id: user_actions
                  name: User Actions
                - id: system_events
                  name: System Events
    invalid:
      - example_id: "cat-sem-legacy-duplicate"
        title: "Duplicate category name across files (legacy)"
        description: "Two categories with the same name in the resource graph trigger this error."
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: categories
            metadata:
              name: my-categories
            spec:
              categories:
                - id: user_actions_2
                  name: User Actions
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/categories/0/name"
            severity: "error"
            message_contains: "duplicate name 'User Actions' within kind 'categories'"
  # Current spec version (rudder/v1).
  - applies_to:
      - kind: "categories"
        version: "rudder/v1"
    valid:
      - example_id: "cat-sem-v1-valid"
        title: "Unique category names (v1)"
        files:
          spec.yaml: |
            version: rudder/v1
            kind: categories
            metadata:
              name: my-categories
            spec:
              categories:
                - id: user_actions
                  name: User Actions
                - id: system_events
                  name: System Events
    invalid:
      - example_id: "cat-sem-v1-duplicate"
        title: "Duplicate category name across files (v1)"
        description: "Two categories with the same name in the resource graph trigger this error."
        files:
          spec.yaml: |
            version: rudder/v1
            kind: categories
            metadata:
              name: my-categories
            spec:
              categories:
                - id: user_actions_2
                  name: User Actions
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/categories/0/name"
            severity: "error"
            message_contains: "duplicate name 'User Actions' within kind 'categories'"
