rule_id: datacatalog/custom-types/spec-syntax-valid
match_behavior:
- applies_to:
  - kind: custom-types
    version: rudder/0.1
  - kind: custom-types
    version: rudder/v0.1
  valid:
  - example_id: ct-spec-legacy-valid
    title: Valid legacy custom-types spec
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: custom-types
        metadata:
          name: my-custom-types
        spec:
          types:
            - id: address
              name: Address
              description: Physical address structure
              type: object
            - id: user_status
              name: UserStatus
              type: string
  invalid:
  - example_id: ct-spec-legacy-missing-name
    title: Legacy custom type missing required name field
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: custom-types
        metadata:
          name: my-custom-types
        spec:
          types:
            - id: user_status
              type: string
    expected_diagnostics:
    - file: spec.yaml
      reference: /types/0/name
      severity: error
      message_contains: '''name'' is required'
  - example_id: ct-spec-legacy-missing-type
    title: Legacy custom type missing required type field
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: custom-types
        metadata:
          name: my-custom-types
        spec:
          types:
            - id: address
              name: Address
    expected_diagnostics:
    - file: spec.yaml
      reference: /types/0/type
      severity: error
      message_contains: '''type'' is required'
- applies_to:
  - kind: custom-types
    version: rudder/v1
  valid:
  - example_id: ct-spec-v1-valid
    title: Valid custom-types spec
    files:
      spec.yaml: |
        version: rudder/v1
        kind: custom-types
        metadata:
          name: my-custom-types
        spec:
          types:
            - id: address
              name: Address
              type: object
            - id: user_status
              name: UserStatus
              type: string
  invalid:
  - example_id: ct-spec-v1-missing-id
    title: v1 custom type missing required id field
    files:
      spec.yaml: |
        version: rudder/v1
        kind: custom-types
        metadata:
          name: my-custom-types
        spec:
          types:
            - name: UserStatus
              type: string
    expected_diagnostics:
    - file: spec.yaml
      reference: /types/0/id
      severity: error
      message_contains: '''id'' is required'
