rule_id: datacatalog/events/spec-syntax-valid
match_behavior:
- applies_to:
  - kind: events
    version: rudder/0.1
  - kind: events
    version: rudder/v0.1
  valid:
  - example_id: ev-spec-legacy-valid
    title: Valid legacy events spec
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: events
        metadata:
          name: my-events
        spec:
          events:
            - id: page_viewed
              event_type: track
              name: Page Viewed
              description: User viewed a page
            - id: user_identified
              event_type: identify
  invalid:
  - example_id: ev-spec-legacy-missing-id
    title: Legacy event missing required id field
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: events
        metadata:
          name: my-events
        spec:
          events:
            - name: Page Viewed
              event_type: track
    expected_diagnostics:
    - file: spec.yaml
      reference: /events/0/id
      severity: error
      message_contains: '''id'' is required'
  - example_id: ev-spec-legacy-invalid-type
    title: Legacy event with invalid event_type
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: events
        metadata:
          name: my-events
        spec:
          events:
            - id: my_event
              event_type: custom
    expected_diagnostics:
    - file: spec.yaml
      reference: /events/0/event_type
      severity: error
      message_contains: '''event_type'' must be one of [track screen identify group page]'
- applies_to:
  - kind: events
    version: rudder/v1
  valid:
  - example_id: ev-spec-v1-valid
    title: Valid events spec
    files:
      spec.yaml: |
        version: rudder/v1
        kind: events
        metadata:
          name: my-events
        spec:
          events:
            - id: page_viewed
              event_type: track
              name: Page Viewed
            - id: user_identified
              event_type: identify
  invalid:
  - example_id: ev-spec-v1-missing-event-type
    title: v1 event missing required event_type field
    files:
      spec.yaml: |
        version: rudder/v1
        kind: events
        metadata:
          name: my-events
        spec:
          events:
            - id: page_viewed
              name: Page Viewed
    expected_diagnostics:
    - file: spec.yaml
      reference: /events/0/event_type
      severity: error
      message_contains: '''event_type'' is required'
