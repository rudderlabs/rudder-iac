rule_id: "datacatalog/custom-types/semantic-valid"
match_behavior:
  # Legacy spec versions share the same semantic validation path.
  - applies_to:
      - kind: "custom-types"
        version: "rudder/0.1"
      - kind: "custom-types"
        version: "rudder/v0.1"
    valid:
      - example_id: "ct-sem-legacy-valid"
        title: "Unique custom type names (legacy)"
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: custom-types
            metadata:
              name: my-custom-types
            spec:
              types:
                - id: address
                  name: Address
                  type: object
                - id: user_status
                  name: UserStatus
                  type: string
    invalid:
      - example_id: "ct-sem-legacy-duplicate-name"
        title: "Duplicate custom type name across files (legacy)"
        description: "Two custom types with the same name in the resource graph trigger this error."
        files:
          spec.yaml: |
            version: rudder/0.1
            kind: custom-types
            metadata:
              name: my-custom-types
            spec:
              types:
                - id: address_v2
                  name: Address
                  type: object
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/types/0/name"
            severity: "error"
            message_contains: "duplicate name 'Address' within kind 'custom-types'"
  # Current spec version (rudder/v1).
  - applies_to:
      - kind: "custom-types"
        version: "rudder/v1"
    valid:
      - example_id: "ct-sem-v1-valid"
        title: "Unique custom type names (v1)"
        files:
          spec.yaml: |
            version: rudder/v1
            kind: custom-types
            metadata:
              name: my-custom-types
            spec:
              types:
                - id: address
                  name: Address
                  type: object
                - id: user_status
                  name: UserStatus
                  type: string
    invalid:
      - example_id: "ct-sem-v1-duplicate-name"
        title: "Duplicate custom type name across files (v1)"
        description: "Two custom types with the same name in the resource graph trigger this error."
        files:
          spec.yaml: |
            version: rudder/v1
            kind: custom-types
            metadata:
              name: my-custom-types
            spec:
              types:
                - id: address_v2
                  name: Address
                  type: object
        expected_diagnostics:
          - file: "spec.yaml"
            reference: "/types/0/name"
            severity: "error"
            message_contains: "duplicate name 'Address' within kind 'custom-types'"
