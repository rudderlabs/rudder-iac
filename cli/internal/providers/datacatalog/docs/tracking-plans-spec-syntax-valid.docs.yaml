rule_id: datacatalog/tracking-plans/spec-syntax-valid
match_behavior:
- applies_to:
  - kind: tp
    version: rudder/0.1
  - kind: tp
    version: rudder/v0.1
  valid:
  - example_id: tp-spec-legacy-valid
    title: Valid legacy Tracking Plan spec
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: tp
        metadata:
          name: my-tracking-plan
        spec:
          id: my_tp
          display_name: My Tracking Plan
          rules:
            - id: signup_rule
              type: event_rule
              event:
                $ref: "#/events/user-events/signup"
              properties:
                - $ref: "#/properties/common/user_id"
                  required: true
  invalid:
  - example_id: tp-spec-legacy-missing-event
    title: Legacy Tracking Plan rule missing event field
    files:
      spec.yaml: |
        version: rudder/0.1
        kind: tp
        metadata:
          name: my-tracking-plan
        spec:
          id: my_tp
          display_name: My Tracking Plan
          rules:
            - id: no_event_rule
              type: event_rule
              properties:
                - $ref: "#/properties/common/user_id"
                  required: true
    expected_diagnostics:
    - file: spec.yaml
      reference: /rules/0/event
      severity: error
      message_contains: '''event'' is required'
- applies_to:
  - kind: tracking-plan
    version: rudder/v1
  valid:
  - example_id: tp-spec-v1-valid
    title: Valid Tracking Plan spec
    files:
      spec.yaml: |
        version: rudder/v1
        kind: tracking-plan
        metadata:
          name: my-tracking-plan
        spec:
          id: my_tp
          display_name: My Tracking Plan
          rules:
            - id: signup_rule
              type: event_rule
              event: "#event:signup"
              properties:
                - property: "#property:user_id"
                  required: true
  invalid:
  - example_id: tp-spec-v1-missing-event
    title: Tracking Plan rule missing event field
    files:
      spec.yaml: |
        version: rudder/v1
        kind: tracking-plan
        metadata:
          name: my-tracking-plan
        spec:
          id: my_tp
          display_name: My Tracking Plan
          rules:
            - id: no_event_rule
              type: event_rule
              properties:
                - property: "#property:user_id"
                  required: true
    expected_diagnostics:
    - file: spec.yaml
      reference: /rules/0/event
      severity: error
      message_contains: '''event'' is required'
