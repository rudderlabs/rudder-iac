version: rudder/v1
kind: properties
metadata:
  name: app_properties
spec:
  properties:
    - id: email_address
      name: Email Address
      description: "User's email address"
      type: string
      config:
        format: email
        min_length: 3
        max_length: 255

    - id: status_code
      name: Status Code
      description: "HTTP status code, nullable"
      types:
        - integer
        - "null"

    - id: tag_list
      name: Tag List
      description: "List of string tags"
      type: array
      item_type: string

    - id: user_scores
      name: User Scores
      description: "User scores as integers or decimals"
      type: array
      item_types:
        - integer
        - number

    - id: user_email
      name: User Email
      description: "User email validated against the email_string custom type"
      type: "#custom-type:email_string"
