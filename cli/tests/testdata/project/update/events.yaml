version: rudder/v0.1
kind: events
metadata:
  name: "api_tracking"
spec:
  events:
  - id: "api_tracking"
    # name is set in BOTH the var file and RUDDER_API_TRACKING_NAME; the env var
    # wins, so it resolves to "API Tracking" (the var file value is ignored).
    name: "{{ .API_TRACKING_NAME }}"
    event_type: "track"
    # description resolves from the var file only (no matching env var is set).
    description: "{{ .API_TRACKING_DESCRIPTION }}"

  - id: "api_error"
    name: "API Error"
    event_type: "track"
    description: "This event is triggered when an API error occurs." 
    category: "#/categories/app_categories/admin_actions"

  - id: "login"
    name: "Login Event"
    event_type: "track"
    description: "This is a login event"
    category: "#/categories/app_categories/user_actions"