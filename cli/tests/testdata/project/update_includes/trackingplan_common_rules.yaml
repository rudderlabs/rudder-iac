version: "rudder/v0.1"
kind: "tp"
metadata:
  name: "common_rules"
spec:
  id: "common_rules"
  display_name: "Common Rules"
  description: "Shared v0.1 event rules for includes coverage"
  rules:
    - type: "event_rule"
      id: "checkout_rule"
      event:
        $ref: "#/events/app_events/checkout"
        allow_unplanned: false
      properties:
        - $ref: "#/properties/api_tracking/user_mail"
          required: true

    - type: "event_rule"
      id: "page_view_rule"
      event:
        $ref: "#/events/app_events/page_view"
        allow_unplanned: false
      properties:
        - $ref: "#/properties/api_tracking/api_path"
          required: true
